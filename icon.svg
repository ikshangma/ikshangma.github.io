<svg width="1000" height="1000" viewBox="0 0 1000 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="petal" d="M 500 500 C 300 200, 600 50, 500 0 C 400 50, 700 200, 500 500 Z" />
    <path id="swoosh" d="M 500 500 C 600 350, 850 350, 900 500 C 850 650, 600 650, 500 500 Z" />
    <path id="petal-wire" d="M 500 500 C 200 150, 700 0, 500 -100 C 300 0, 800 150, 500 500 Z" fill="none" stroke="#58793c" stroke-width="4" />
  </defs>
  <g transform="translate(500, 500)">
    <g fill="#808080" opacity="0.6">
      <use href="#swoosh" x="-500" y="-500" transform="rotate(15)" />
      <use href="#swoosh" x="-500" y="-500" transform="rotate(75)" />
      <use href="#swoosh" x="-500" y="-500" transform="rotate(135)" />
      <use href="#swoosh" x="-500" y="-500" transform="rotate(195)" />
      <use href="#swoosh" x="-500" y="-500" transform="rotate(255)" />
      <use href="#swoosh" x="-500" y="-500" transform="rotate(315)" />
    </g>

    <g fill="#ffffff" opacity="0.9" transform="scale(0.6)">
      <use href="#petal" x="-500" y="-500" transform="rotate(30)" />
      <use href="#petal" x="-500" y="-500" transform="rotate(90)" />
      <use href="#petal" x="-500" y="-500" transform="rotate(150)" />
      <use href="#petal" x="-500" y="-500" transform="rotate(210)" />
      <use href="#petal" x="-500" y="-500" transform="rotate(270)" />
      <use href="#petal" x="-500" y="-500" transform="rotate(330)" />
    </g>

    <g transform="scale(0.7)">
      <use href="#petal-wire" x="-500" y="-500" transform="rotate(0)" />
      <use href="#petal-wire" x="-500" y="-500" transform="rotate(60)" />
      <use href="#petal-wire" x="-500" y="-500" transform="rotate(120)" />
      <use href="#petal-wire" x="-500" y="-500" transform="rotate(180)" />
      <use href="#petal-wire" x="-500" y="-500" transform="rotate(240)" />
      <use href="#petal-wire" x="-500" y="-500" transform="rotate(300)" />
    </g>
  </g>
</svg>
