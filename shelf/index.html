<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookshelf | Esha Rai</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ============================================================
         VARIABLES
         ============================================================ */
      :root {
        --white: #ffffff;
        --fg: #1a1a1a;
        --fg-soft: #383838;
        --fg-muted: #6e6e6e;
        --fg-subtle: #adadad;
        --green: #4a7540;
        --green-dark: #345428;
        --rule: #e6e6e6;
        --rule-soft: #efefef;

        --font-display: "EB Garamond", Georgia, serif;
        --font-sans: "Source Sans 3", system-ui, -apple-system, sans-serif;

        --max-w: 1100px;
        --transition: 0.18s ease;
      }

      /* ============================================================
         RESET & BASE
         ============================================================ */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background: var(--white);
        color: var(--fg);
        font-family: var(--font-sans);
        font-size: 1rem;
        line-height: 1.75;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }

      /* ============================================================
         HEADER & NAV
         ============================================================ */
      #site-header {
        padding: 1rem 2rem 0.85rem;
        margin-bottom: 3rem;
      }

      .header-inner {
        max-width: var(--max-w);
        margin: 0 auto;
        display: flex;
        justify-content: center;
        position: relative;
        align-items: center;
      }

      .site-name {
        font-family: var(--font-display);
        font-size: 2.35rem;
        font-weight: 400;
        color: var(--fg);
        letter-spacing: 0.06em;
        line-height: 1;
      }

      .back-link {
        position: absolute;
        left: 0;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-family: var(--font-sans);
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--fg-muted);
        text-decoration: none;
        transition: color var(--transition);
      }

      .back-link:hover {
        color: var(--green);
      }

      /* ============================================================
         LAYOUT
         ============================================================ */
      .container {
        max-width: var(--max-w);
        margin: 0 auto;
        padding: 0 2rem;
      }

      /* Side-by-side shelves */
      .shelves-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
        padding: 2.5rem 0 5rem;
        align-items: start;
      }

      .shelf-column {
        min-width: 0;
      }

      .shelf-column--read {
        padding-right: 3.5rem;
        border-right: 1px solid var(--rule);
      }

      .shelf-column--tbr {
        padding-left: 3.5rem;
      }

      .section-title {
        font-family: var(--font-display);
        font-size: 1.5rem;
        font-weight: 400;
        letter-spacing: 0.02em;
        color: var(--fg);
        margin-bottom: 1.75rem;
        padding-bottom: 0.25rem;
      }

      /* "Read" title — left aligned, underline extends right */
      .shelf-column--read .section-title {
        text-align: left;
        border-bottom: 1px solid var(--rule);
      }

      /* "To Be Read" title — right aligned, underline extends left */
      .shelf-column--tbr .section-title {
        text-align: right;
        border-bottom: 1px solid var(--rule);
      }

      /* ============================================================
         BOOK GRID
         ============================================================ */
      .book-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
        gap: 1.6rem 1.2rem;
      }

      .book-card {
        position: relative;
        will-change: transform;
        transition:
          transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
          box-shadow 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        transform-origin: bottom center;
      }

      .book-card img {
        display: block;
        width: 100%;
        aspect-ratio: 2 / 3;
        object-fit: cover;
        border-radius: 2px 5px 5px 2px;
        box-shadow:
          2px 4px 10px rgba(0, 0, 0, 0.1),
          1px 2px 4px rgba(0, 0, 0, 0.06);
        border: 1px solid var(--rule-soft);
        background-color: #f9f9f9;
        transition: box-shadow 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }

      .book-card:hover {
        transform: translateY(-10px) scale(1.02);
      }

      .book-card:hover img {
        box-shadow:
          4px 18px 32px rgba(0, 0, 0, 0.15),
          2px 6px 10px rgba(0, 0, 0, 0.08);
      }

      /* ============================================================
         ANIMATIONS
         ============================================================ */

      /* Header fades in once on load */
      #site-header {
        animation: headerFade 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      @keyframes headerFade {
        from {
          opacity: 0;
          transform: translateY(-6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Section titles */
      .section-title {
        opacity: 0;
        animation: titleReveal 0.65s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .shelf-column:nth-child(1) .section-title {
        animation-delay: 0.15s;
      }
      .shelf-column:nth-child(2) .section-title {
        animation-delay: 0.25s;
      }

      @keyframes titleReveal {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Individual book cards — staggered via JS-set --i */
      .book-card {
        opacity: 0;
        animation: cardRise 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
        animation-delay: calc(0.18s + var(--i, 0) * 0.055s);
      }

      @keyframes cardRise {
        from {
          opacity: 0;
          transform: translateY(18px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      /* Footer */
      .site-footer {
        opacity: 0;
        animation: footerFade 0.6s ease both;
        animation-delay: 0.5s;
      }

      @keyframes footerFade {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      /* ============================================================
         FOOTER
         ============================================================ */
      .site-footer {
        border-top: 1px solid var(--rule);
        padding: 1.75rem 2rem;
        text-align: center;
        font-family: var(--font-sans);
        font-size: 0.76rem;
        color: var(--fg-subtle);
        margin-top: 2.5rem;
        letter-spacing: 0.03em;
      }

      /* ============================================================
         RESPONSIVE — mobile stays stacked
         ============================================================ */
      @media (max-width: 700px) {
        .header-inner {
          flex-direction: column;
          gap: 1rem;
        }

        .back-link {
          position: static;
        }

        .shelves-row {
          grid-template-columns: 1fr;
          gap: 0;
          padding: 0;
        }

        .shelf-column--read {
          border-right: none;
          border-bottom: 1px solid var(--rule);
          padding-right: 0;
          padding-bottom: 2.5rem;
          padding-top: 2rem;
        }

        .shelf-column--tbr {
          padding-left: 0;
          padding-top: 2rem;
          padding-bottom: 3rem;
        }

        .shelf-column--tbr .section-title {
          text-align: left;
        }

        .book-grid {
          grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
          gap: 1.4rem 1rem;
        }
      }
    </style>
  </head>
  <body>
    <header id="site-header">
      <div class="header-inner">
        <a href="../index.html" class="back-link" aria-label="Back">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          Back
        </a>
        <h1 class="site-name"></h1>
      </div>
    </header>

    <div class="container">
      <div class="shelves-row">
        <!-- READ column -->
        <div class="shelf-column shelf-column--read">
          <h2 class="section-title">Read</h2>
          <div class="book-grid" id="read-grid">
            <div class="book-card" style="--i: 0">
              <img
                src="1.webp"
                alt="Sea Prayer"
                loading="lazy"
                onerror="
                  this.src =
                    'https://via.placeholder.com/200x300?text=Sea+Prayer'
                "
              />
            </div>
            <div class="book-card" style="--i: 1">
              <img
                src="2.webp"
                alt="The Courage to be Happy"
                loading="lazy"
                onerror="
                  this.src =
                    'https://via.placeholder.com/200x300?text=Courage+to+be+Happy'
                "
              />
            </div>
            <div class="book-card" style="--i: 2">
              <img
                src="3.webp"
                alt="The Courage to be Disliked"
                loading="lazy"
                onerror="
                  this.src =
                    'https://via.placeholder.com/200x300?text=Courage+to+be+Disliked'
                "
              />
            </div>
            <div class="book-card" style="--i: 3">
              <img
                src="4.webp"
                alt="Silent Spring"
                loading="lazy"
                onerror="
                  this.src =
                    'https://via.placeholder.com/200x300?text=Silent+Spring'
                "
              />
            </div>
            <div class="book-card" style="--i: 4">
              <img
                src="5.webp"
                alt="Thinking, Fast and Slow"
                loading="lazy"
                onerror="
                  this.src =
                    'https://via.placeholder.com/200x300?text=Thinking+Fast+Slow'
                "
              />
            </div>
            <div class="book-card" style="--i: 5">
              <img
                src="6.webp"
                alt="The Sixth Extinction"
                loading="lazy"
                onerror="
                  this.src =
                    'https://via.placeholder.com/200x300?text=Sixth+Extinction'
                "
              />
            </div>
            <div class="book-card" style="--i: 6">
              <img
                src="7.webp"
                alt="Sapiens"
                loading="lazy"
                onerror="
                  this.src = 'https://via.placeholder.com/200x300?text=Sapiens'
                "
              />
            </div>
            <div class="book-card" style="--i: 7">
              <img
                src="8.webp"
                alt="Braiding Sweetgrass"
                loading="lazy"
                onerror="
                  this.src =
                    'https://via.placeholder.com/200x300?text=Braiding+Sweetgrass'
                "
              />
            </div>
            <div class="book-card" style="--i: 8">
              <img
                src="9.webp"
                alt="A Sand County Almanac"
                loading="lazy"
                onerror="
                  this.src =
                    'https://via.placeholder.com/200x300?text=Sand+County+Almanac'
                "
              />
            </div>
            <div class="book-card" style="--i: 9">
              <img
                src="10.webp"
                alt="The Hidden Life of Trees"
                loading="lazy"
                onerror="
                  this.src =
                    'https://via.placeholder.com/200x300?text=Hidden+Life+of+Trees'
                "
              />
            </div>
            <div class="book-card" style="--i: 10">
              <img
                src="11.webp"
                alt="Guns, Germs, and Steel"
                loading="lazy"
                onerror="
                  this.src =
                    'https://via.placeholder.com/200x300?text=Guns+Germs+Steel'
                "
              />
            </div>
            <div class="book-card" style="--i: 11">
              <img
                src="12.webp"
                alt="Drawdown"
                loading="lazy"
                onerror="
                  this.src = 'https://via.placeholder.com/200x300?text=Drawdown'
                "
              />
            </div>
            <div class="book-card" style="--i: 12">
              <img
                src="13.webp"
                alt="The Overstory"
                loading="lazy"
                onerror="
                  this.src =
                    'https://via.placeholder.com/200x300?text=The+Overstory'
                "
              />
            </div>
          </div>
        </div>

        <!-- TO BE READ column -->
        <div class="shelf-column shelf-column--tbr">
          <h2 class="section-title">To Be Read</h2>
          <div class="book-grid" id="tbr-grid"></div>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; <span id="year"></span> Esha Rai</p>
      </div>
    </footer>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.bookshelfLoaded) return;
        window.bookshelfLoaded = true;

        const yearEl = document.getElementById("year");
        if (yearEl) yearEl.textContent = new Date().getFullYear();

        const tbrGrid = document.getElementById("tbr-grid");
        const extensions = ["webp", "jpg", "jpeg", "png"];

        async function loadTBRGrid() {
          let index = 1;
          let keepSearching = true;

          while (keepSearching) {
            let foundUrl = null;

            for (const ext of extensions) {
              const url = `_${index}.${ext}`;
              try {
                const response = await fetch(url);
                const contentType = response.headers.get("content-type");
                if (
                  response.ok &&
                  contentType &&
                  contentType.includes("image")
                ) {
                  foundUrl = url;
                  break;
                }
              } catch (error) {
                // Network error, continue
              }
            }

            if (foundUrl) {
              const card = document.createElement("div");
              card.className = "book-card";
              // Stagger TBR cards starting after a short offset
              card.style.setProperty("--i", index - 1);

              const img = document.createElement("img");
              img.src = foundUrl;
              img.alt = `TBR Book ${index}`;
              img.loading = "lazy";

              card.appendChild(img);
              tbrGrid.appendChild(card);
              index++;
            } else {
              keepSearching = false;
              if (index === 1) {
                tbrGrid.innerHTML =
                  '<p style="color: var(--fg-muted); font-style: italic; font-size: 0.9rem;">No TBR books found.</p>';
              }
            }
          }
        }

        loadTBRGrid();
      });
    </script>
  </body>
</html>
